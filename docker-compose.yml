services:
  backend:
    build:
      context: ./backend
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data

  web:
    build:
      context: ./web
    env_file:
      - web/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

